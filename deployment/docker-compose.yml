version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tem-barber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tem_barber_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tem_barber}
    volumes:
      - tem_barber_postgres_data:/var/lib/postgresql/data
    # No ports exposed to host for database security

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: tem-barber-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tem_barber_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tem_barber}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.tembarber.com.br}
    volumes:
      - tem_barber_uploads:/app/public/uploads
    depends_on:
      - postgres

  caddy:
    image: caddy:2-alpine
    container_name: tem-barber-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  tem_barber_postgres_data:
  tem_barber_uploads:
  caddy_data:
  caddy_config:
